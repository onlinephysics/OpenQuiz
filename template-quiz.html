<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Template — OpenQuiz</title>

    <!-- KaTeX (optional — for math rendering) -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap');

        :root {
            --primary:        #2563eb;
            --primary-hover:  #1d4ed8;
            --primary-light:  #e8f0fe;
            --primary-glow:   rgba(37,99,235,0.15);
            --accent:         #0ea472;
            --accent-hover:   #047857;

            --bg:             #f4f6f9;
            --bg-elevated:    #ffffff;
            --card:           #ffffff;
            --card-hover:     #f8fafc;

            --text:           #1a2235;
            --text-secondary: #5a6a85;
            --muted:          #64748b;

            --border:         #dde3ed;
            --border-strong:  #cbd5e1;
            --border-focus:   #93b4fd;
            --shadow-sm:      0 1px 3px rgba(30,50,100,0.07);
            --shadow:         0 4px 12px rgba(30,50,100,0.09), 0 2px 4px rgba(30,50,100,0.05);
            --shadow-md:      0 8px 30px rgba(30,50,100,0.12);
            --shadow-lg:      0 12px 28px rgba(30,50,100,0.12), 0 4px 8px rgba(30,50,100,0.06);

            --header-grad:    linear-gradient(90deg, #2563eb, #60a5fa);
            --section-grad:   linear-gradient(135deg, #1d4ed8 0%, #4f46e5 100%);

            --correct:        #16a34a;
            --correct-bg:     #dcfce7;
            --wrong:          #dc2626;
            --wrong-bg:       #fee2e2;
            --warning:        #d97706;
            --warning-bg:     #fef9c3;
            --hover-bg:       #eef1f6;

            --explain-bg:     #eef3ff;
            --explain-border: #2563eb;
            --explain-text:   #1e3a6b;

            --tracker-bg:     #e8f0fe;
            --tracker-text:   #2563eb;
            --score-bg:       #d1fae5;
            --score-text:     #065f46;

            --glass-bg:       rgba(255,255,255,0.7);
            --glass-border:   rgba(255,255,255,0.4);
            --glass-blur:     16px;

            --radius-sm: 6px;
            --radius-md: 9px;
            --radius-lg: 14px;
            --transition-fast: 0.15s ease;
            --transition:      0.25s ease;
        }

        body.dark {
            --primary:        #5b9cf6;
            --primary-hover:  #7db3f8;
            --primary-light:  rgba(91,156,246,0.14);
            --primary-glow:   rgba(91,156,246,0.15);
            --accent:         #34d399;
            --accent-hover:   #6ee7b7;

            --bg:             #1c1f26;
            --bg-elevated:    #252930;
            --card:           #252930;
            --card-hover:     #2f333d;

            --text:           #e8ecf4;
            --text-secondary: #9aa3b8;
            --muted:          #64748b;

            --border:         #3a3f4c;
            --border-strong:  #475569;
            --border-focus:   #5b9cf6;
            --shadow-sm:      0 1px 4px rgba(0,0,0,0.25);
            --shadow:         0 4px 14px rgba(0,0,0,0.32);
            --shadow-md:      0 8px 30px rgba(0,0,0,0.38);
            --shadow-lg:      0 10px 30px rgba(0,0,0,0.38);

            --header-grad:    linear-gradient(90deg, #2563eb, #60a5fa);
            --section-grad:   linear-gradient(135deg, #1e3a5f 0%, #312e81 50%, #4c1d95 100%);

            --correct:        #4ade80;
            --correct-bg:     rgba(22,163,74,0.15);
            --wrong:          #f87171;
            --wrong-bg:       rgba(220,38,38,0.15);
            --warning:        #fbbf24;
            --warning-bg:     rgba(217,119,6,0.15);
            --hover-bg:       #2f333d;

            --explain-bg:     rgba(37,99,235,0.1);
            --explain-border: #5b9cf6;
            --explain-text:   #a8c4f0;

            --tracker-bg:     rgba(91,156,246,0.14);
            --tracker-text:   #5b9cf6;
            --score-bg:       rgba(74,222,128,0.15);
            --score-text:     #4ade80;

            --glass-bg:       rgba(37,41,48,0.7);
            --glass-border:   rgba(58,63,76,0.5);
            --glass-blur:     16px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', 'Noto Sans Bengali', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            font-size: 15px;
            transition: background-color 0.25s ease, color 0.25s ease;
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--primary); text-decoration: none; }
        a:hover { color: var(--primary-hover); }
        button { font-family: inherit; cursor: pointer; border: none; outline: none; transition: all var(--transition-fast); }
        ::selection { background: var(--primary); color: white; }

        .hidden { display: none !important; }
        .container { max-width: 600px; margin: 0 auto; padding: 0 16px; }
        .text-center { text-align: center; }
        .flex-center { display: flex; align-items: center; justify-content: center; }

        .dark-btn {
            background: var(--hover-bg);
            border: 1.5px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 13px;
            border-radius: var(--radius-md);
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .dark-btn:hover { background: var(--border); color: var(--text); }

        .start-screen {
            position: fixed; inset: 0; z-index: 300;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 16px;
            background-color: var(--bg);
            transition: opacity 0.35s ease, transform 0.35s ease;
            overflow-y: auto;
        }
        .start-screen.hide { opacity: 0; transform: scale(1.03); pointer-events: none; }
        .start-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px 20px 18px;
            width: 100%; max-width: 380px; text-align: center;
            position: relative;
            box-shadow: var(--shadow-sm);
        }
        .start-icon { font-size: 28px; line-height: 1; margin-bottom: 6px; }
        .start-qcount { font-size: 12px; font-weight: 700; color: var(--muted); margin: 2px 0 4px; }
        .start-badge {
            display: inline-flex; align-items: center;
            font-size: 9px; letter-spacing: 1.2px; color: var(--primary);
            text-transform: uppercase;
            background: var(--tracker-bg); border: 1px solid var(--explain-border);
            border-radius: 99px; padding: 2px 10px; margin-bottom: 8px;
        }
        .start-title { font-size: clamp(15px,3.5vw,20px); font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
        .start-sub { color: var(--text-secondary); font-size: 12px; line-height: 1.5; margin-bottom: 14px; }
        .start-info-row { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
        .info-chip {
            display: flex; flex-direction: column; align-items: center;
            background: var(--hover-bg); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 5px 12px; min-width: 60px;
        }
        .info-chip .chip-val { font-size: 15px; font-weight: 700; color: var(--primary); }
        .info-chip .chip-label { font-size: 8px; color: var(--text-secondary); letter-spacing: 0.6px; text-transform: uppercase; }

        .start-btn {
            width: 100%;
            background-color: var(--primary);
            border: none; border-radius: var(--radius-md); padding: 10px 20px;
            font-size: 14px; font-weight: 600; color: #fff;
            cursor: pointer;
        }
        .start-btn:hover { background-color: var(--primary-hover); }

        .quiz-wrapper { width: 100%; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100vh; padding: 24px 16px; }
        .quiz-container { background-color: var(--card); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
        .quiz-header { background: var(--header-grad); padding: 12px 16px 0; color: white; }
        .quiz-header-top { display: flex; justify-content: space-between; align-items: center; }
        .quiz-header-title { font-size: 17px; font-weight: 700; color: white; line-height: 1.3; margin: 8px 0 0; }
        .quiz-header-location { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.65); margin: 1px 0 0; }
        .progress-wrap { background: rgba(255,255,255,0.20); height: 5px; margin-top: 10px; border-radius: 3px; }
        .progress-bar { height: 100%; background: #facc15; transition: width 0.45s ease; width: 0%; }

        .card-body-quiz { padding: 24px 24px 22px; }
        .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .question-tracker { background: var(--tracker-bg); color: var(--tracker-text); font-size: 13px; font-weight: 700; padding: 5px 13px; border-radius: 20px; }
        .score-badge { background: var(--score-bg); color: var(--score-text); font-size: 13px; font-weight: 700; padding: 5px 13px; border-radius: 20px; }

        .timer-wrap { position: relative; width: 46px; height: 46px; flex-shrink: 0; }
        .timer-wrap svg { transform: rotate(-90deg); width: 46px; height: 46px; }
        .timer-track { fill: none; stroke: var(--border); stroke-width: 4; }
        .timer-fill { fill: none; stroke: var(--primary); stroke-width: 4; stroke-linecap: round; stroke-dasharray: 113.1; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.4s; }
        .timer-fill.warn { stroke: var(--wrong); }
        .timer-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 13px; font-weight: 700; color: var(--primary); }
        .timer-num.warn { color: var(--wrong); }

        .question-text { font-size: 20px; font-weight: 700; margin-bottom: 18px; line-height: 1.5; color: var(--text); }

        .options-container { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
        @media(max-width:480px) { .options-container { grid-template-columns: 1fr; } }
        .option-btn {
            background: var(--card); border: 2px solid var(--border); border-radius: var(--radius-md);
            padding: 12px 14px; font-size: 15px; text-align: left; cursor: pointer;
            transition: background 0.22s, border-color 0.22s, transform 0.12s, box-shadow 0.18s;
            color: var(--text); display: flex; align-items: center; gap: 11px; min-height: 54px;
        }
        .option-btn:nth-child(1) { border-left: 4px solid #e53935; }
        .option-btn:nth-child(2) { border-left: 4px solid #1e88e5; }
        .option-btn:nth-child(3) { border-left: 4px solid #43a047; }
        .option-btn:nth-child(4) { border-left: 4px solid #fb8c00; }
        .option-btn .opt-label {
            display: inline-flex; align-items: center; justify-content: center;
            width: 30px; height: 30px; min-width: 30px; border-radius: 50%;
            font-size: 13px; font-weight: 700; flex-shrink: 0;
        }
        .option-btn:nth-child(1) .opt-label { background: #fde8e8; color: #c62828; }
        .option-btn:nth-child(2) .opt-label { background: #e3f0fb; color: #1565c0; }
        .option-btn:nth-child(3) .opt-label { background: #e8f5e9; color: #2e7d32; }
        .option-btn:nth-child(4) .opt-label { background: #fff3e0; color: #e65100; }
        body.dark .option-btn:nth-child(1) .opt-label { background: #3b1a1a; color: #ef9a9a; }
        body.dark .option-btn:nth-child(2) .opt-label { background: #152536; color: #90caf9; }
        body.dark .option-btn:nth-child(3) .opt-label { background: #1a2e1a; color: #a5d6a7; }
        body.dark .option-btn:nth-child(4) .opt-label { background: #2e2010; color: #ffcc80; }
        .option-btn:hover:not(:disabled) { background: var(--hover-bg); transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.12); }
        .option-btn:disabled { cursor: not-allowed; }
        .option-btn.correct { background: var(--correct-bg) !important; border-color: var(--correct) !important; }
        .option-btn.correct .opt-label { background: var(--correct) !important; color: white !important; }
        .option-btn.wrong { background: var(--wrong-bg) !important; border-color: var(--wrong) !important; }
        .option-btn.wrong .opt-label { background: var(--wrong) !important; color: white !important; }

        .explanation-box { display: none; margin-top: 16px; background: var(--explain-bg); border-left: 4px solid var(--explain-border); border-radius: 0 8px 8px 0; padding: 13px 15px; }
        .explanation-box.show { display: block; }
        .ex-title { font-size: 13px; font-weight: 700; color: var(--primary); margin-bottom: 6px; }
        .ex-text  { font-size: 15px; line-height: 1.65; color: var(--explain-text); }

        .footer-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 22px; }
        .timeout-msg { font-size: 13px; color: var(--wrong); font-weight: 600; display: none; }
        .timeout-msg.show { display: block; }
        .next-btn { background: var(--primary); color: white; border: none; padding: 12px 26px; font-size: 17px; border-radius: 8px; cursor: pointer; display: none; font-weight: 700; margin-left: auto; }
        .next-btn.show { display: block; }
        .next-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }

        .result-container { display: none; text-align: center; padding: 10px 0 8px; }
        .result-hero { margin-bottom: 12px; }
        .result-percentage { font-size: 14px; font-weight: 800; padding: 3px 14px; border-radius: 99px; display: inline-block; margin-bottom: 4px; }
        .result-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
        .result-stat { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 8px 6px; text-align: center; }
        .stat-icon { font-size: 16px; margin-bottom: 2px; }
        .stat-value { font-size: 16px; font-weight: 800; color: var(--text); }
        .stat-label { font-size: 10px; color: var(--muted); font-weight: 600; }
        .correct-stat { border-color: var(--correct); }
        .correct-stat .stat-value { color: var(--correct); }
        .wrong-stat { border-color: var(--wrong); }
        .wrong-stat .stat-value { color: var(--wrong); }
        .timeout-stat { border-color: var(--warning); }
        .timeout-stat .stat-value { color: var(--warning); }
        .result-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }

        .result-review-section { text-align: left; margin-top: 4px; border-top: 1.5px solid var(--border); padding-top: 12px; }
        .review-header h4 { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 10px; }

        .review-filter-group { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
        .review-filter-btn { padding: 5px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; border: 1.5px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; transition: all 0.2s; }
        .review-filter-btn:hover { border-color: var(--primary); color: var(--text); }
        .review-filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .review-filter-btn.active-all { background: var(--primary); color: #fff; border-color: var(--primary); }
        .review-filter-btn.active-correct { background: var(--correct); color: #fff; border-color: var(--correct); }
        .review-filter-btn.active-wrong { background: var(--wrong); color: #fff; border-color: var(--wrong); }
        .review-filter-btn.active-timeout { background: var(--warning); color: #fff; border-color: var(--warning); }
        .review-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; }
        .review-card.correct { border-left: 3px solid var(--correct); }
        .review-card.wrong { border-left: 3px solid var(--wrong); }
        .review-card.timeout { border-left: 3px solid var(--warning); }
        .review-card-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
        .review-q-number { font-size: 11px; font-weight: 800; background: var(--hover-bg); padding: 2px 8px; border-radius: 5px; }
        .review-status { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; }
        .review-status-correct { background: var(--correct-bg); color: var(--correct); }
        .review-status-wrong { background: var(--wrong-bg); color: var(--wrong); }
        .review-status-timeout { background: var(--warning-bg); color: var(--warning); }
        .review-question { font-size: 14px; font-weight: 700; margin-bottom: 8px; line-height: 1.5; color: var(--text); }
        .review-options { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; }
        .review-option { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 8px; border: 1.5px solid var(--border); font-size: 13px; background: var(--card); }
        .review-option.review-correct { background: var(--correct-bg); border-color: var(--correct); }
        .review-option.review-wrong { background: var(--wrong-bg); border-color: var(--wrong); }
        .review-option.review-selected-correct { background: var(--correct-bg); border-color: var(--correct); }
        .review-opt-label { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; min-width: 26px; border-radius: 50%; font-size: 12px; font-weight: 700; background: var(--hover-bg); color: var(--text); flex-shrink: 0; }
        .review-correct .review-opt-label { background: var(--correct); color: white; }
        .review-wrong .review-opt-label { background: var(--wrong); color: white; }
        .review-opt-text { flex: 1; min-width: 0; }
        .review-opt-marker { font-weight: 800; font-size: 16px; flex-shrink: 0; }
        .review-explanation { background: var(--explain-bg); border-left: 3px solid var(--explain-border); border-radius: 0 8px 8px 0; padding: 8px 12px; margin-top: 4px; }
        .review-ex-title { font-size: 11px; font-weight: 700; color: var(--primary); margin-bottom: 3px; }
        .review-ex-text { font-size: 13px; line-height: 1.5; color: var(--explain-text); }

        .restart-btn { background: var(--primary); color: white; border: none; padding: 9px 22px; font-size: 14px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .restart-btn:hover { background: var(--primary-hover); }

        .quit-btn {
            padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 700;
            background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.2); cursor: pointer;
            transition: all 0.2s; white-space: nowrap;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .quit-btn:hover { background: rgba(239,68,68,0.8); color: white; border-color: rgba(239,68,68,0.8); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: none; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .anim-fade-up { animation: fadeUp 0.4s ease; }

        .site-footer { border-top: 1px solid var(--border); padding: 16px; text-align: center; margin-top: auto; }
        .footer-copy { font-size: 11px; color: var(--muted); }

        @media(max-width:480px) {
            .result-stats-grid { grid-template-columns: repeat(2, 1fr); }
            .review-question { font-size: 13px; }
            .quiz-wrapper { padding: 12px 8px; }
            .card-body-quiz { padding: 16px; }
        }
    </style>
</head>

<body>

    <script>
        const QUIZ_CONFIG = {
            title: 'Sample General Knowledge Quiz',
            subject: 'General Knowledge',
            chapter: 'World Geography',
            topic: '',
            timerSeconds: 30,
        };

        const QUESTIONS = [
            {
                question: 'What is the largest continent by land area?',
                options: ['Africa', 'Asia', 'North America', 'Europe'],
                correct: 1,
                explanation: 'Asia is the largest continent, covering about 30% of Earth\'s land area.',
                difficulty: 'easy',
                referenceTags: ['geography', 'continents']
            },
            {
                question: 'Which river is the longest in the world?',
                options: ['Amazon', 'Nile', 'Yangtze', 'Mississippi'],
                correct: 1,
                explanation: 'The Nile River stretches approximately 6,650 km (4,130 mi) through northeastern Africa.',
                difficulty: 'easy',
                referenceTags: ['geography', 'rivers']
            },
            {
                question: 'What is the chemical symbol for gold?',
                options: ['Go', 'Gd', 'Au', 'Ag'],
                correct: 2,
                explanation: 'Au comes from the Latin word "aurum", meaning gold.',
                difficulty: 'easy',
                referenceTags: ['chemistry', 'elements']
            },
            {
                question: 'In which year did World War II end?',
                options: ['1943', '1944', '1945', '1946'],
                correct: 2,
                explanation: 'World War II ended in 1945 with the surrender of Germany in May and Japan in September.',
                difficulty: 'medium',
                referenceTags: ['history', 'wars']
            },
            {
                question: 'What is the speed of light in vacuum (approx.)?',
                options: ['3 × 10⁶ m/s', '3 × 10⁸ m/s', '3 × 10¹⁰ m/s', '3 × 10⁵ m/s'],
                correct: 1,
                explanation: 'The speed of light in vacuum is approximately 299,792,458 m/s, or 3 × 10⁸ m/s.',
                difficulty: 'medium',
                referenceTags: ['physics', 'light']
            },
            {
                question: 'Who wrote "Romeo and Juliet"?',
                options: ['Charles Dickens', 'William Shakespeare', 'Jane Austen', 'Mark Twain'],
                correct: 1,
                explanation: 'William Shakespeare wrote Romeo and Juliet around 1597.',
                difficulty: 'easy',
                referenceTags: ['literature', 'plays']
            },
            {
                question: 'What is the powerhouse of the cell?',
                options: ['Nucleus', 'Ribosome', 'Mitochondria', 'Golgi apparatus'],
                correct: 2,
                explanation: 'Mitochondria generate most of the cell\'s ATP, earning them the nickname "powerhouse of the cell".',
                difficulty: 'easy',
                referenceTags: ['biology', 'cells']
            },
            {
                question: 'Which planet has the most moons?',
                options: ['Jupiter', 'Saturn', 'Uranus', 'Neptune'],
                correct: 1,
                explanation: 'As of 2024, Saturn has 146 known moons—the most of any planet in the solar system.',
                difficulty: 'hard',
                referenceTags: ['astronomy', 'planets']
            },
            {
                question: 'What is the derivative of x²?',
                options: ['x', '2x', 'x²', '2'],
                correct: 1,
                explanation: 'Using the power rule: d/dx(xⁿ) = nxⁿ⁻¹, so d/dx(x²) = 2x.',
                difficulty: 'hard',
                referenceTags: ['mathematics', 'calculus']
            },
            {
                question: 'Which element has the highest melting point?',
                options: ['Tungsten', 'Carbon (Diamond)', 'Osmium', 'Rhenium'],
                correct: 1,
                explanation: 'Diamond (carbon) has the highest melting point at about 3,550°C (6,422°F). Tungsten is the highest among metals.',
                difficulty: 'hard',
                referenceTags: ['chemistry', 'elements']
            }
        ];
    </script>

    <div class="start-screen" id="startScreen">
        <div class="start-card">
            <button class="dark-btn" style="position:absolute;top:8px;right:8px;padding:3px 8px;font-size:10px;"
                onclick="toggleDark()">🌙</button>
            <div class="start-icon">📝</div>
            <div class="start-badge" id="startBadge">MCQ</div>
            <div class="start-title" id="startTitle">Loading...</div>
            <div class="start-qcount" id="startQcount"></div>
            <div class="start-sub" id="startSub"></div>
            <div class="start-info-row">
                <div class="info-chip"><span class="chip-val" id="chipQuestions">—</span><span class="chip-label">QUESTIONS</span></div>
                <div class="info-chip"><span class="chip-val" id="chipTime">—</span><span class="chip-label">TIME/Q</span></div>
            </div>
            <button class="start-btn" id="startBtn">🚀 Start Quiz</button>
        </div>
    </div>

    <div class="quiz-wrapper hidden" id="quizWrapper">
        <div class="quiz-container">
            <div class="quiz-header">
                <div class="quiz-header-top">
                    <span style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.8);">OpenQuiz</span>
                    <button class="quit-btn" id="quitBtn" onclick="quitQuiz()">✕ Quit</button>
                </div>
                <h2 class="quiz-header-title" id="quizHeaderTitle">Quiz</h2>
                <p class="quiz-header-location" id="quizHeaderLocation"></p>
                <div class="progress-wrap">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
            <div class="card-body-quiz">
                <div id="quizContent">
                    <div class="meta-row">
                        <div class="question-tracker" id="tracker">—</div>
                        <div style="display:flex;align-items:center;gap:10px;">
                            <div class="score-badge" id="scoreBadge">✅ Score: 0</div>
                            <div class="timer-wrap">
                                <svg viewBox="0 0 46 46">
                                    <circle class="timer-track" cx="23" cy="23" r="18" />
                                    <circle class="timer-fill" id="timerFill" cx="23" cy="23" r="18" />
                                </svg>
                                <div class="timer-num" id="timerNum">30</div>
                            </div>
                        </div>
                    </div>
                    <div class="question-text" id="question">—</div>
                    <div class="options-container" id="optionsContainer"></div>
                    <div class="explanation-box" id="explanationBox">
                        <div class="ex-title">💡 Explanation</div>
                        <div class="ex-text" id="explanationText"></div>
                    </div>
                    <div class="footer-controls">
                        <div class="timeout-msg" id="timeoutMsg">⏱ Time's up!</div>
                        <button class="next-btn" id="nextBtn">Next ❯</button>
                    </div>
                </div>
                <div class="result-container" id="resultBox"></div>
            </div>
        </div>

        <div id="quitModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);" onclick="event.target===this && hideQuitModal()">
            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;max-width:320px;width:90%;text-align:center;box-shadow:var(--shadow-lg);">
                <h3 style="margin-bottom:12px;font-size:18px;">⚠️ Confirm</h3>
                <p style="margin-bottom:16px;color:var(--text-secondary);font-size:14px;">Are you sure you want to quit?<br><span style="color:var(--wrong);font-weight:600;">Your progress will be lost.</span></p>
                <div style="display:flex;gap:12px;justify-content:center;">
                    <button class="btn" style="flex:1;padding:8px 16px;border-radius:var(--radius-md);background:var(--hover-bg);color:var(--text);border:1.5px solid var(--border);font-size:13px;font-weight:600;" onclick="hideQuitModal()">Cancel</button>
                    <button class="btn" style="flex:1;padding:8px 16px;border-radius:var(--radius-md);background:var(--wrong);color:white;border:none;font-size:13px;font-weight:600;" onclick="confirmQuit()">Yes, Quit</button>
                </div>
            </div>
        </div>

        <div class="site-footer">
            <div class="footer-copy">© 2026 Self Study &nbsp;·&nbsp; Government School</div>
        </div>
    </div>

    <script>
        const $ = (id) => document.getElementById(id);

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function toggleDark() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('[data-theme-toggle], .dark-btn');
            if (btn) btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
        }

        let state = {
            questions: [],
            currentIndex: 0,
            score: 0,
            correctCount: 0,
            wrongCount: 0,
            timeoutCount: 0,
            results: [],
            timerSeconds: 30,
            timerInterval: null,
            timeRemaining: 30,
            isAnswered: false,
            totalTimeTaken: 0,
            totalQuestions: 0,
        };

        function initQuiz() {
            const config = QUIZ_CONFIG;
            const questions = QUESTIONS;

            state.questions = shuffleArray([...questions]);
            state.totalQuestions = state.questions.length;
            state.timerSeconds = config.timerSeconds || 30;
            state.currentIndex = 0;
            state.score = 0;
            state.correctCount = 0;
            state.wrongCount = 0;
            state.timeoutCount = 0;
            state.results = [];
            state.totalTimeTaken = 0;

            $('startBadge').textContent = config.subject || 'MCQ';
            $('startTitle').textContent = config.title || 'Quiz';
            $('startQcount').textContent = `Total ${state.totalQuestions} questions`;
            const subParts = [config.chapter, config.topic].filter(Boolean);
            $('startSub').innerHTML = subParts.join(' · ') || '';
            $('chipQuestions').textContent = state.totalQuestions;
            $('chipTime').textContent = state.timerSeconds + 's';

            $('quizHeaderTitle').textContent = config.title || 'Quiz';
            const locParts = [config.subject, config.chapter, config.topic].filter(Boolean);
            $('quizHeaderLocation').textContent = locParts.join(' > ');

            document.title = `${config.title || 'Quiz'} — OpenQuiz`;

            $('startScreen').classList.remove('hidden');
            $('quizWrapper').classList.add('hidden');

            $('startBtn').onclick = () => {
                $('startScreen').classList.add('hide');
                setTimeout(() => {
                    $('startScreen').style.display = 'none';
                    $('quizWrapper').classList.remove('hidden');
                    showQuestion();
                }, 400);
            };

            $('nextBtn').onclick = () => {
                if (state.currentIndex < state.totalQuestions - 1) {
                    state.currentIndex++;
                    showQuestion();
                } else {
                    showResult();
                }
            };
        }

        function showQuestion() {
            const q = state.questions[state.currentIndex];
            if (!q) return;

            state.isAnswered = false;
            state.timeRemaining = state.timerSeconds;

            $('tracker').textContent = `${state.currentIndex + 1} / ${state.totalQuestions}`;
            $('scoreBadge').textContent = `✅ Score: ${state.score}`;
            $('progressBar').style.width = `${((state.currentIndex) / state.totalQuestions) * 100}%`;

            $('question').textContent = q.question;

            const labels = ['A', 'B', 'C', 'D'];
            $('optionsContainer').innerHTML = q.options.map((opt, i) =>
                `<button class="option-btn" data-index="${i}" onclick="selectOption(${i})">
                    <span class="opt-label">${labels[i]}</span>
                    <span>${opt}</span>
                </button>`
            ).join('');

            $('explanationBox').classList.remove('show');
            $('explanationText').textContent = '';
            $('timeoutMsg').classList.remove('show');
            $('nextBtn').classList.remove('show');
            document.querySelectorAll('.option-btn').forEach(b => {
                b.disabled = false;
                b.classList.remove('correct', 'wrong');
            });

            const circumference = 113.1;
            $('timerFill').style.strokeDashoffset = '0';
            $('timerFill').classList.remove('warn');
            $('timerNum').textContent = state.timerSeconds;
            $('timerNum').classList.remove('warn');

            if (state.timerInterval) clearInterval(state.timerInterval);

            const startTime = Date.now();
            state.timerInterval = setInterval(() => {
                state.timeRemaining--;
                $('timerNum').textContent = state.timeRemaining;

                const offset = circumference * (1 - state.timeRemaining / state.timerSeconds);
                $('timerFill').style.strokeDashoffset = offset;

                if (state.timeRemaining <= 5) {
                    $('timerFill').classList.add('warn');
                    $('timerNum').classList.add('warn');
                }

                if (state.timeRemaining <= 0) {
                    clearInterval(state.timerInterval);
                    handleTimeout();
                }
            }, 1000);

            state._questionStartTime = startTime;
        }

        function selectOption(index) {
            if (state.isAnswered) return;
            state.isAnswered = true;
            clearInterval(state.timerInterval);

            const q = state.questions[state.currentIndex];
            const timeTaken = Math.round((Date.now() - state._questionStartTime) / 1000);
            state.totalTimeTaken += timeTaken;

            const btns = document.querySelectorAll('.option-btn');
            btns.forEach((b, i) => {
                b.disabled = true;
                if (i === q.correct) b.classList.add('correct');
                if (i === index && i !== q.correct) b.classList.add('wrong');
            });

            const isCorrect = index === q.correct;
            if (isCorrect) {
                state.score++;
                state.correctCount++;
            } else {
                state.wrongCount++;
            }

            state.results.push({
                questionIndex: state.currentIndex,
                question: q.question,
                options: q.options,
                correct: q.correct,
                selected: index,
                isCorrect,
                isTimeout: false,
                timeTaken,
                explanation: q.explanation || '',
                difficulty: q.difficulty || '',
                referenceTags: q.referenceTags || []
            });

            showExplanation(q.explanation);
            updateScore();
        }

        function handleTimeout() {
            if (state.isAnswered) return;
            state.isAnswered = true;

            const timeTaken = state.timerSeconds;
            state.totalTimeTaken += timeTaken;
            state.timeoutCount++;

            const q = state.questions[state.currentIndex];

            const btns = document.querySelectorAll('.option-btn');
            btns.forEach((b, i) => {
                b.disabled = true;
                if (i === q.correct) b.classList.add('correct');
            });

            $('timeoutMsg').classList.add('show');

            state.results.push({
                questionIndex: state.currentIndex,
                question: q.question,
                options: q.options,
                correct: q.correct,
                selected: -1,
                isCorrect: false,
                isTimeout: true,
                timeTaken,
                explanation: q.explanation || '',
                difficulty: q.difficulty || '',
                referenceTags: q.referenceTags || []
            });

            showExplanation(q.explanation);
        }

        function showExplanation(text) {
            if (text) {
                $('explanationText').textContent = text;
                $('explanationBox').classList.add('show');
            }
            $('nextBtn').classList.add('show');
            if (state.currentIndex >= state.totalQuestions - 1) {
                $('nextBtn').textContent = '📊 See Results';
            } else {
                $('nextBtn').textContent = 'Next ❯';
            }
        }

        function updateScore() {
            $('scoreBadge').textContent = `✅ Score: ${state.score}`;
            $('progressBar').style.width = `${((state.currentIndex + 1) / state.totalQuestions) * 100}%`;
        }

        function showResult() {
            $('quizContent').style.display = 'none';
            $('progressBar').style.width = '100%';

            const pct = state.totalQuestions > 0
                ? Math.round((state.correctCount / state.totalQuestions) * 100)
                : 0;
            const avgTime = state.totalQuestions > 0
                ? Math.round(state.totalTimeTaken / state.totalQuestions)
                : 0;

            let gradeColor = 'var(--correct)';
            let gradeLabel = 'Great!';
            if (pct < 40) { gradeColor = 'var(--wrong)'; gradeLabel = 'Keep Practicing'; }
            else if (pct < 70) { gradeColor = 'var(--warning)'; gradeLabel = 'Good Effort'; }

            const container = $('resultBox');
            container.style.display = 'block';

            let reviewHTML = '';
            state.results.forEach((r, i) => {
                const statusClass = r.isTimeout ? 'timeout' : (r.isCorrect ? 'correct' : 'wrong');
                const statusLabel = r.isTimeout ? '⏱ Timeout' : (r.isCorrect ? '✅ Correct' : '❌ Wrong');
                const statusBadgeClass = r.isTimeout ? 'review-status-timeout' : (r.isCorrect ? 'review-status-correct' : 'review-status-wrong');

                let optionsHTML = '';
                r.options.forEach((opt, oi) => {
                    let cls = '';
                    let marker = '';
                    if (oi === r.correct && oi === r.selected) {
                        cls = 'review-selected-correct';
                        marker = '✓';
                    } else if (oi === r.correct) {
                        cls = 'review-correct';
                        marker = '✓';
                    } else if (oi === r.selected) {
                        cls = 'review-wrong';
                        marker = '✗';
                    }
                    const labels = ['A', 'B', 'C', 'D'];
                    optionsHTML += `
                        <div class="review-option ${cls}">
                            <span class="review-opt-label">${labels[oi]}</span>
                            <span class="review-opt-text">${opt}</span>
                            ${marker ? `<span class="review-opt-marker">${marker}</span>` : ''}
                        </div>`;
                });

                const exHTML = r.explanation ? `
                    <div class="review-explanation">
                        <div class="review-ex-title">💡 Explanation</div>
                        <div class="review-ex-text">${r.explanation}</div>
                    </div>` : '';

                reviewHTML += `
                    <div class="review-card ${statusClass} anim-fade-up" style="animation-delay:${i * 0.05}s">
                        <div class="review-card-header">
                            <span class="review-q-number">Q${i + 1}</span>
                            <span class="review-status ${statusBadgeClass}">${statusLabel}</span>
                            <span class="review-time">${r.timeTaken}s</span>
                        </div>
                        <div class="review-question">${r.question}</div>
                        <div class="review-options">${optionsHTML}</div>
                        ${exHTML}
                    </div>`;
            });

            container.innerHTML = `
                <div class="result-hero">
                    <div class="result-percentage" style="background:${gradeColor}20;color:${gradeColor}">
                        ${pct}% — ${gradeLabel}
                    </div>
                </div>
                <div class="result-stats-grid">
                    <div class="result-stat correct-stat">
                        <div class="stat-icon">✅</div>
                        <div class="stat-value">${state.correctCount}</div>
                        <div class="stat-label">Correct</div>
                    </div>
                    <div class="result-stat wrong-stat">
                        <div class="stat-icon">❌</div>
                        <div class="stat-value">${state.wrongCount}</div>
                        <div class="stat-label">Wrong</div>
                    </div>
                    <div class="result-stat timeout-stat">
                        <div class="stat-icon">⏱</div>
                        <div class="stat-value">${state.timeoutCount}</div>
                        <div class="stat-label">Timeout</div>
                    </div>
                    <div class="result-stat time-stat">
                        <div class="stat-icon">⏱</div>
                        <div class="stat-value">${avgTime}s</div>
                        <div class="stat-label">Avg Time</div>
                    </div>
                    <div class="result-stat correct-stat">
                        <div class="stat-icon">🎯</div>
                        <div class="stat-value">${state.score}</div>
                        <div class="stat-label">Score</div>
                    </div>
                    <div class="result-stat pct-stat">
                        <div class="stat-icon">📊</div>
                        <div class="stat-value">${state.totalQuestions}</div>
                        <div class="stat-label">Total Qs</div>
                    </div>
                </div>
                <div class="result-actions">
                    <button class="restart-btn" onclick="restartQuiz()">🔄 Restart Quiz</button>
                </div>
                <div class="result-review-section">
                    <div class="review-header"><h4>📋 Review All Questions</h4></div>
                    <div class="review-filter-group" id="reviewFilterGroup">
                        <button class="review-filter-btn active active-all" data-filter="all" onclick="setReviewFilter('all')">📋 All (${state.totalQuestions})</button>
                        <button class="review-filter-btn" data-filter="correct" onclick="setReviewFilter('correct')">✅ Correct (${state.correctCount})</button>
                        <button class="review-filter-btn" data-filter="wrong" onclick="setReviewFilter('wrong')">❌ Wrong (${state.wrongCount})</button>
                        <button class="review-filter-btn" data-filter="timeout" onclick="setReviewFilter('timeout')">⏱ Timeout (${state.timeoutCount})</button>
                    </div>
                    <div id="reviewCardsContainer">${reviewHTML}</div>
                </div>
            `;
        }

        function restartQuiz() {
            if (state.timerInterval) clearInterval(state.timerInterval);
            $('quizContent').style.display = 'block';
            $('resultBox').style.display = 'none';
            $('resultBox').innerHTML = '';
            $('nextBtn').textContent = 'Next ❯';
            initQuiz();
            $('startBtn').click();
        }

        function quitQuiz() { $('quitModal').style.display = 'block'; }
        function hideQuitModal() { $('quitModal').style.display = 'none'; }
        function confirmQuit() {
            if (state.timerInterval) clearInterval(state.timerInterval);
            hideQuitModal();
            $('startScreen').classList.remove('hidden');
            $('startScreen').classList.remove('hide');
            $('startScreen').style.display = 'flex';
            $('quizWrapper').classList.add('hidden');
            $('quizContent').style.display = 'block';
            $('resultBox').style.display = 'none';
        }

        function setReviewFilter(filter) {
            const btns = document.querySelectorAll('.review-filter-btn');
            btns.forEach(b => {
                b.classList.remove('active', 'active-all', 'active-correct', 'active-wrong', 'active-timeout');
                if (b.dataset.filter === filter) {
                    b.classList.add('active', `active-${filter}`);
                }
            });
            const cards = document.querySelectorAll('.review-card');
            cards.forEach(c => {
                if (filter === 'all') {
                    c.style.display = 'block';
                } else {
                    c.style.display = c.classList.contains(filter) ? 'block' : 'none';
                }
            });
        }

        window.selectOption = selectOption;
        window.toggleDark = toggleDark;
        window.quitQuiz = quitQuiz;
        window.hideQuitModal = hideQuitModal;
        window.confirmQuit = confirmQuit;
        window.restartQuiz = restartQuiz;
        window.setReviewFilter = setReviewFilter;

        document.addEventListener('DOMContentLoaded', initQuiz);
    </script>

</body>
</html>
